<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GW2 WvW Zerg Composition</title>

<style>
body {
    font-family: Arial;
    background: #0b1020;
    color: #e2e8f0;
    margin: 0;
}

h1 {
    text-align: center;
    padding: 20px;
    color: #38bdf8;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 15px;
    padding: 20px;
}

/* CARDS */
.card {
    background: #111827;
    border-radius: 12px;
    padding: 15px;
    transition: all 0.2s ease;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(255,255,255,0.2);
}

/* ROLE COLORS */
.stability { border-left: 5px solid #3b82f6; }
.heal { border-left: 5px solid #22c55e; }
.boon { border-left: 5px solid #facc15; }
.strip { border-left: 5px solid #a855f7; }
.dps { border-left: 5px solid #ef4444; }

/* ITEMS */
.item {
    display: flex;
    align-items: center;
    margin: 6px 0;
}

.item img {
    width: 28px;
    height: 28px;
    margin-right: 10px;
}

.title {
    font-weight: bold;
    margin-bottom: 10px;
    font-size: 18px;
}

.warning {
    color: #facc15;
    margin-left: 6px;
}

/* TOOLTIP */
.tooltip {
    position: relative;
    cursor: help;
}

.tooltip::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: 125%;
    left: 50%;
    transform: translateX(-50%);
    
    background: #1f2937;
    color: #e5e7eb;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
    white-space: nowrap;

    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
}

.tooltip:hover::after {
    opacity: 1;
}
</style>
</head>

<body>

<h1>GW2 WvW Zerg Composition</h1>

<div class="grid">

<!-- STABILITY -->
<div class="card stability">
<div class="title">🛡 Stability</div>
<div class="item"><img src="icons/firebrand.png">Firebrand</div>
<div class="item"><img src="icons/tempest.png">Tempest <span class="warning tooltip" data-tooltip="Kann auch Heal spielen">⚠</span></div>
<div class="item"><img src="icons/scrapper.png">Scrapper <span class="warning tooltip" data-tooltip="Kann auch Heal oder DPS spielen">⚠</span></div>
</div>

<!-- HEAL -->
<div class="card heal">
<div class="title">🚑 Heal / Cleanse</div>
<div class="item"><img src="icons/tempest.png">Tempest <span class="warning tooltip" data-tooltip="Kann auch Stability oder DPS spielen">⚠</span></div>
<div class="item"><img src="icons/scrapper.png">Scrapper <span class="warning tooltip" data-tooltip="Kann auch Stability oder DPS spielen">⚠</span></div>
<div class="item"><img src="icons/druid.png">Druid</div>
<div class="item"><img src="icons/specter.png">Specter <span class="warning tooltip" data-tooltip="Kann auch Support DPS spielen">⚠</span></div>
</div>

<!-- BOON -->
<div class="card boon">
<div class="title">🔋 Boons</div>
<div class="item"><img src="icons/chronomancer.png">Chronomancer</div>
<div class="item"><img src="icons/catalyst.png">Catalyst <span class="warning tooltip" data-tooltip="Kann auch DPS spielen">⚠</span></div>
<div class="item"><img src="icons/herald.png">Herald</div>
</div>

<!-- STRIP -->
<div class="card strip">
<div class="title">🪫 Strip</div>
<div class="item"><img src="icons/scourge.png">Scourge</div>
<div class="item"><img src="icons/reaper.png">Reaper</div>
<div class="item"><img src="icons/harbinger.png">Harbinger</div>
<div class="item"><img src="icons/spellbreaker.png">Spellbreaker <span class="warning tooltip" data-tooltip="Kann auch DPS spielen">⚠</span></div>
<div class="item"><img src="icons/virtuoso.png">Virtuoso</div>
</div>

<!-- DPS -->
<div class="card dps">
<div class="title">⚔ DPS</div>
<div class="item"><img src="icons/dragonhunter.png">Dragonhunter</div>
<div class="item"><img src="icons/holosmith.png">Holosmith</div>
<div class="item"><img src="icons/scrapper.png">Scrapper <span class="warning tooltip" data-tooltip="Kann auch Heal oder Stability spielen">⚠</span></div>
<div class="item"><img src="icons/renegade.png">Renegade</div>
<div class="item"><img src="icons/tempest.png">Tempest <span class="warning tooltip" data-tooltip="Kann auch Heal oder Stability spielen">⚠</span></div>
<div class="item"><img src="icons/berserker.png">Berserker</div>
<div class="item"><img src="icons/weaver.png">Weaver</div>
</div>

</div>

</body>
</html>
